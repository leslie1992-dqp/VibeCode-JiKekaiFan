spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/fooddelivery?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456

  data:
    redis:
      host: 192.168.48.128
      port: 6379
      password: 123456
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON 处理时忽略空字段

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: food-delivery-seckill
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.food.delivery.dto.messaging
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.food.delivery.dto.messaging.SeckillClaimEvent

mybatis-plus:
  type-aliases-package: com.food.delivery.entity # 实体别名扫描包

logging:
  level:
    '[com.food.delivery]': debug


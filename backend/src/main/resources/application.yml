server:
  port: 8081

spring:
  application:
    name: food-delivery
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 35MB

app:
  jwt:
    secret: "food-delivery-demo-secret-key-please-change"
    expire-hours: 24
  seckill:
    # Redis+Lua 闸门；false 时退回纯 DB（无 Redis 环境）
    redis-lua-enabled: true
    # true 时先发 Kafka 由消费者落库；false 时请求线程内同步写库（默认本地开发更简单）
    kafka-enabled: true
    kafka-topic: seckill-claim
  upload:
    # 评论图片等本地文件存储目录（运行目录下）
    dir: food-delivery-uploads
  delivery:
    enabled: true
    realtime-enabled: true
    location-store-enabled: true
    location-min-interval-ms: 1000
    # 演示：时长约为「未缩放公式」的十分之一，ETA 与商家 distance_km 成正比
    demo-time-scale: 0.1
    eta-base-minutes: 8
    eta-minutes-per-km: 3
    eta-default-distance-km: 3
    demo-assigned-to-arrive-minutes: 2
    demo-arrive-to-pickup-minutes: 1
    demo-pickup-to-ship-minutes: 0.5
    demo-deliver-before-eta-minutes: 2

